name: Release

# Uses Changesets to version packages, generate changelogs, and publish to
# npm. On every push to main, if changeset files exist, a "Version Packages"
# PR is created/updated. When that PR is merged, versions are bumped,
# changelogs generated, GitHub releases created, and packages published to
# npm in dependency order.
#
# Required secret: NPM_TOKEN — an npm automation token with publish access
# to the @decentralized-global-education-skills-passport scope.

on:
  push:
    branches: [main]

# Required for changesets/action to push branches, create commits,
# and open pull requests.
#
# NOTE: Some organizations restrict the built-in GITHUB_TOKEN from creating
# PRs even with pull-requests: write set. If you hit that, create a classic
# PAT with `repo` scope at https://github.com/settings/tokens and save it as
# a GH_TOKEN secret in Settings > Secrets and variables > Actions.
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build is handled by each package's prepublishOnly script during publish.
      # Pre-building here would duplicate the work on every push to main.

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish:all
          commit: 'chore(release): version packages'
          title: 'Version Packages'
        env:
          # Use a Personal Access Token if set (bypasses org-level PR
          # restrictions); otherwise fall back to the built-in GITHUB_TOKEN.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
