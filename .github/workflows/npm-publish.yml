name: Release

# Uses Changesets to version packages, generate changelogs, and publish to
# npm. On every push to main, if changeset files exist, a "Version Packages"
# PR is created/updated. When that PR is merged, versions are bumped,
# changelogs generated, GitHub releases created, and packages published to
# npm in dependency order.
#
# Required secret: NPM_TOKEN — an npm automation token with publish access
# to the @decentralized-global-education-skills-passport scope.

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build is handled by each package's prepublishOnly script during publish.
      # Pre-building here would duplicate the work on every push to main.

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm publish:all
          commit: 'chore(release): version packages'
          title: 'Version Packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
